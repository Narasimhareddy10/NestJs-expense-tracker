# Alternative: Deploy to Render (easier but sleeps after 15min inactivity)
# Uncomment and push to Render

services:
  - type: web
    name: expense-tracker-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: STAGE
        value: prod
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false  # Set manually in Render dashboard
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
